name: Deploy to Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - '.eleventy.js'
      - 'package.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build content site → _site/ (trailhead, articles, trails, library, etc.)
      - name: Install content site dependencies
        run: npm ci
      - name: Build content site
        run: npm run build

      # Build marketing site → site/_site/ (just index.html)
      - name: Install marketing site dependencies
        working-directory: ./site
        run: npm ci
      - name: Build marketing site
        working-directory: ./site
        run: npm run build

      # Combine: content site as base, marketing index.html on top
      - name: Combine outputs
        run: |
          mkdir -p _combined
          cp -r _site/* _combined/
          cp -r site/_site/* _combined/

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_combined

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
